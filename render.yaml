# Blueprint for Render Deployment
services:
  - type: web
    name: artsy-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - fromGroup: artsy_secrets # You will create this group in Render UI

  - type: web
    name: artsy-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://artsy-backend.onrender.com # Change this if your render name differs
